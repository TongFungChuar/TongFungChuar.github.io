<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tong Fung Chuar</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    background-color: black;
    height: 100%;
  }
  .header {
    position: fixed;
    width: 100%;
    color: black;
    background: transparent;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    padding: 10px;
    box-sizing: border-box;
  }
  .header a {
    color: rgb(255, 255, 255);
    text-decoration: none;
    font-family: Arial, sans-serif;
  }
  /* Navigation link styles */
  .header .right a {
    cursor: pointer;
    text-decoration: none;
    color: rgb(255, 255, 255);
    padding: 5px;
  }

  .header .right a:hover {
    text-decoration: underline;
  }

  .active {
    text-decoration: underline;
  }

  @media screen and (max-width: 1050px) {
    .header .left, .header .right a {
      font-size: 15px;
    }

    .header {
      background: rgba(255, 255, 255, 0);
      padding: 8px;
    }
  }

  /* Slideshow container fills the viewport regardless of orientation,
     so images always have a defined box to size themselves against */
  .slideshow-container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .mySlides {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 2s ease-in-out;
  }

  /* Applies in both portrait and landscape now, so mobile portrait
     no longer falls back to unset/cropped sizing */
  .mySlides img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

</style>
</head>
<body>

<div class="header">
  <a class="left">Tong Fung Chuar</a>
  <div class="right">
    <a href="./info">Info /</a>  <a href="./archive">Works /</a>  <a href="./Contact">Contact</a>
  </div>
</div>

<div class="slideshow-container">
  <div class="mySlides">
    <img src="https://res.cloudinary.com/dt5cghjrg/image/upload/v1711896780/tetjjdfteriwjrhwwjzy.jpg" alt="Artwork by Tong Fung Chuar">
  </div>

  <div class="mySlides">
    <img src="https://res.cloudinary.com/dt5cghjrg/image/upload/v1711905479/qgoccmashcy2kgsyrmui.jpg" alt="Artwork by Tong Fung Chuar">
  </div>

  <div class="mySlides">
    <img src="https://res.cloudinary.com/dt5cghjrg/image/upload/v1711896768/xm0slgizay996kelizjg.jpg" alt="Artwork by Tong Fung Chuar">
  </div>

  <div class="mySlides">
    <img src="https://res.cloudinary.com/dt5cghjrg/image/upload/v1711896809/oulzsjdytx6ttrnasbyy.jpg" alt="Artwork by Tong Fung Chuar">
  </div>

  <div class="mySlides">
    <img src="https://res.cloudinary.com/dt5cghjrg/image/upload/v1711905786/gepofzh8lph3dntrq2us.jpg" alt="Artwork by Tong Fung Chuar">
  </div>

  <div class="mySlides">
    <img src="https://res.cloudinary.com/dt5cghjrg/image/upload/v1711912822/nmi13mux6cb8axjdz3ak.jpg" alt="Artwork by Tong Fung Chuar">
  </div>

  <div class="mySlides">
    <img src="https://res.cloudinary.com/dt5cghjrg/image/upload/v1711905479/tioqds0r3mjagwwv6jfr.jpg" alt="Artwork by Tong Fung Chuar">
  </div>
</div>

<script>
  // Starts at -1 so the very first call always advances to slide 0,
  // regardless of how many slides exist.
  var slideIndex = -1;

  function showSlides() {
    var slides = document.getElementsByClassName("mySlides");
    var nextIndex = (slideIndex + 1) % slides.length;

    for (var i = 0; i < slides.length; i++) {
      if (i !== nextIndex) {
        slides[i].style.opacity = 0;
      }
    }

    slides[nextIndex].style.opacity = 1;
    slideIndex = nextIndex;

    setTimeout(showSlides, 5000);
  }

  document.addEventListener('DOMContentLoaded', showSlides);
</script>

</body>
</html>
